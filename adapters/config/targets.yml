copilot:
  outputs:
    - path: "~/.ai-standards/dist/COPILOT_RULES.md"
      mode: merge
      includes:
        - ai/docs/standards/global/**
        - ai/docs/standards/php-laravel/**
        - ai/docs/standards/ts-hono/**
        - ai/docs/standards/cf-workers/**
        - ai/docs/standards/react-native/**
      header_template: "adapters/templates/copilot_header.md"
      footer_template: "adapters/templates/copilot_footer.md"

