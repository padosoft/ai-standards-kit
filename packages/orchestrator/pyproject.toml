[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-orchestrator"
version = "0.4.0"
description = "Parlant-style governance orchestrator for Claude Code - part of @padosoft/ai-enterprise"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Padosoft"}
]
keywords = ["mcp", "orchestrator", "parlant", "llm", "governance", "claude", "enterprise"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

dependencies = [
    "fastmcp>=0.4.0",
    "pydantic>=2.7.0",
    "mysqlclient>=2.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.8.0",
    "ruff>=0.2.0",
]
pymysql = [
    "PyMySQL>=1.1.0",
]
# Webhooks - async HTTP client for webhook dispatch
webhooks = [
    "httpx>=0.27.0",
]
# Metrics - Prometheus metrics collection
metrics = [
    "prometheus-client>=0.20.0",
]
# HTTP Server - REST API and MCP-over-HTTP
http = [
    "starlette>=0.35.0",
    "uvicorn>=0.27.0",
    "sse-starlette>=2.0.0",
]
# All enterprise features
enterprise = [
    "httpx>=0.27.0",
    "prometheus-client>=0.20.0",
    "starlette>=0.35.0",
    "uvicorn>=0.27.0",
    "sse-starlette>=2.0.0",
]
# Full installation (all optional dependencies)
all = [
    "ai-orchestrator[dev,pymysql,enterprise]",
]

[project.scripts]
ai-orchestrator = "ai_orchestrator.server:run_server"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]
